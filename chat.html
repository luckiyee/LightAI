<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LightAI - Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles/main.css" />
  </head>
  <body class="chat-page">
    <div class="ambient-dots" aria-hidden="true">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
    <div id="toastRoot" class="toast-root"></div>

    <div class="chat-layout">
      <aside class="chat-sidebar">
        <div class="sidebar-top">
          <a class="logo brand-lockup" href="./index.html">
            <img src="./app%20icon.png" alt="LightAI icon" class="logo-icon" />
            <span>LightAI</span>
          </a>
          <button id="newChatBtn" class="btn btn-outline full">+ New Chat</button>
        </div>

        <div class="sidebar-conversations">
          <h2>Conversations</h2>
          <ul id="conversationList" class="conversation-list"></ul>
        </div>

        <div class="sidebar-auth">
          <div id="authLoggedOut" class="auth-mini">
            <input id="usernameInput" type="text" placeholder="Username" minlength="3" maxlength="32" />
            <input id="passwordInput" type="password" placeholder="Password" minlength="8" maxlength="128" />
            <div class="auth-actions">
              <button id="loginBtn" class="btn btn-primary" type="button">Login</button>
              <button id="registerBtn" class="btn btn-outline" type="button">Register</button>
            </div>
          </div>

          <div id="authLoggedIn" class="auth-user" hidden>
            <p>Signed in as <strong id="authUsername"></strong></p>
            <button id="logoutBtn" class="btn btn-outline full" type="button">Logout</button>
          </div>
        </div>

        <div class="sponsored-box">SPONSORED ADVERTISEMENT</div>
      </aside>

      <section class="chat-main">
        <header class="chat-header">
          <div>
            <h2 id="chatTitle">Light Chat</h2>
            <p id="statusPill" class="status-inline">Checking connection...</p>
          </div>
          <div class="model-controls readonly-controls">
            <span class="readonly-chip">Model: <strong id="modelBadge">Light</strong></span>
            <span class="readonly-chip" id="runtimeHint">Fast mode</span>
          </div>
        </header>

        <div id="chatMessages" class="chat-feed" aria-live="polite"></div>

        <footer class="chat-composer-wrap">
          <form id="chatForm" class="chat-composer">
            <textarea
              id="promptInput"
              rows="1"
              maxlength="4000"
              placeholder="Message LightAI..."
              required
            ></textarea>
            <div class="composer-row">
              <div class="composer-left">
                <div class="quick-actions">
                  <button id="quickActionsBtn" class="quick-plus-btn" type="button" aria-label="More actions">
                    +
                  </button>
                  <div id="quickActionsMenu" class="quick-actions-menu" hidden>
                    <button id="uploadFileBtn" class="quick-action-item" type="button">Upload file</button>
                    <button id="uploadImageBtn" class="quick-action-item" type="button">Upload image</button>
                    <button id="toggleWebSearchBtn" class="quick-action-item" type="button">Web search: Off</button>
                  </div>
                </div>
                <label class="edition-dropdown-wrap chatbox-edition" for="editionSelect">
                  <select id="editionSelect" class="edition-dropdown" aria-label="Choose Light edition">
                    <option value="flash">Flash</option>
                    <option value="light">Light</option>
                  </select>
                </label>
                <span id="charCount" class="hint" hidden>0 / 4000</span>
              </div>
              <div class="composer-buttons">
                <button id="sendBtn" class="btn btn-primary icon-btn" type="submit" aria-label="Send">
                  <span id="sendBtnLabel" aria-hidden="true">➤</span>
                </button>
                <button id="cancelBtn" class="btn btn-danger icon-btn" type="button" hidden>
                  Cancel
                </button>
              </div>
            </div>
            <div id="attachmentList" class="attachment-list"></div>
            <input id="fileInput" type="file" multiple hidden />
            <input id="imageInput" type="file" accept="image/*" multiple hidden />
          </form>
          <div class="mini-footer-links">
            <a href="./tos.html">Terms of Service</a>
            <a href="./privacy.html">Privacy Policy</a>
            <a href="./pricing.html">Pricing</a>
          </div>
        </footer>
      </section>
    </div>

    <template id="messageTemplate">
      <article class="msg">
        <div class="msg-row">
          <div class="msg-avatar" aria-hidden="true"></div>
          <div class="msg-body">
            <p class="msg-content"></p>
            <div class="msg-actions">
              <button class="mini-action source-btn" type="button" hidden>🌐 0</button>
              <button class="mini-action copy-btn" type="button">Copy</button>
              <button class="mini-action retry-btn" type="button">Retry</button>
            </div>
          </div>
        </div>
      </article>
    </template>

    <script type="module" src="./scripts/app.js"></script>
  </body>
</html>
