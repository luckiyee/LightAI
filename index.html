<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LightAI</title>
    <link rel="stylesheet" href="./styles/main.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-dot" aria-hidden="true"></div>
          <h1>LightAI</h1>
        </div>
        <div id="statusPill" class="status-pill" aria-live="polite">Checking status...</div>
      </header>

      <main class="layout">
        <aside class="settings-card">
          <h2>Settings</h2>
          <label for="modelSelect">Model</label>
          <select id="modelSelect" aria-label="Select model"></select>

          <label for="temperatureRange">Temperature <span id="temperatureValue">0.7</span></label>
          <input id="temperatureRange" type="range" min="0" max="1.5" step="0.1" value="0.7" />

          <label for="maxTokensInput">Max tokens</label>
          <input id="maxTokensInput" type="number" min="64" max="8192" step="64" value="1024" />

          <div class="control-buttons">
            <button id="newChatBtn" class="btn btn-secondary" type="button">New Chat</button>
            <button id="clearChatBtn" class="btn btn-secondary" type="button">Clear Chat</button>
          </div>
        </aside>

        <section class="chat-panel">
          <div id="chatMessages" class="messages" aria-live="polite"></div>

          <form id="chatForm" class="composer">
            <textarea
              id="promptInput"
              placeholder="Ask LightAI anything..."
              rows="3"
              maxlength="4000"
              required
            ></textarea>
            <div class="composer-actions">
              <span id="charCount" class="hint">0 / 4000</span>
              <div class="button-row">
                <button id="retryBtn" class="btn btn-secondary" type="button">Retry</button>
                <button id="cancelBtn" class="btn btn-secondary" type="button" disabled>Cancel</button>
                <button id="sendBtn" class="btn btn-primary" type="submit">Send</button>
              </div>
            </div>
          </form>
        </section>
      </main>
    </div>

    <template id="messageTemplate">
      <article class="message">
        <div class="message-header">
          <strong class="role-label"></strong>
          <button class="copy-btn" type="button" hidden>Copy</button>
        </div>
        <p class="message-content"></p>
      </article>
    </template>

    <script type="module" src="./scripts/app.js"></script>
  </body>
</html>
